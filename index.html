<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>描字格</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:"PingFang SC","Noto Sans SC",sans-serif;background:transparent;user-select:none;-webkit-user-select:none;touch-action:none}
#app{position:fixed;inset:0;display:flex;flex-direction:column;background:rgba(245,245,250,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
/* 顶部栏 */
#top-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:14px;color:#666;flex-shrink:0}
#mode-label{font-weight:500;cursor:pointer;padding:4px 12px;border-radius:14px;background:rgba(0,0,0,0.05)}
#mode-label:active{background:rgba(0,0,0,0.1)}
.top-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;color:#666;line-height:1}
.top-btn:active{background:rgba(0,0,0,0.1)}

/* 中间行：按钮-田字格-按钮 */
#mid-row{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:4px 8px;min-height:0}
.side-btn{
  width:44px;height:80px;flex-shrink:0;
  background:rgba(0,0,0,0.04);border:none;border-radius:12px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:11px;color:#888;gap:2px;line-height:1.2;
  -webkit-tap-highlight-color:transparent;
}
.side-btn:active{background:rgba(0,0,0,0.1)}
.side-btn .arrow{font-size:20px;color:#666}
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-width:0}
#grid-canvas{display:block;touch-action:none;border-radius:8px;max-width:100%;max-height:100%}

/* 底部 */
#bottom-area{display:flex;flex-direction:column;align-items:center;padding:8px 20px 14px;gap:4px;flex-shrink:0}
#current-char{font-size:24px;font-weight:300;color:#888;letter-spacing:2px;min-height:28px;line-height:1.3}
#progress-wrap{width:100%;max-width:280px;height:3px;background:rgba(0,0,0,0.08);border-radius:2px;overflow:hidden;opacity:0;transition:opacity 0.3s}
#progress-wrap.show{opacity:1}
#progress-bar{height:100%;width:0%;background:#888;border-radius:2px;transition:width 0.3s ease}
#bottom-ctrl{display:flex;gap:10px;align-items:center}
.bot-btn{background:rgba(0,0,0,0.05);border:none;border-radius:16px;padding:5px 14px;font-size:12px;color:#666;cursor:pointer}
.bot-btn:active{background:rgba(0,0,0,0.12)}

/* 面板 */
#panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;display:none;align-items:center;justify-content:center}
#panel-overlay.show{display:flex}
#panel{background:white;border-radius:16px;padding:24px;width:88%;max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
#panel h2{font-size:18px;font-weight:500;color:#333;margin-bottom:16px}
#panel label{display:block;font-size:14px;color:#555;margin:12px 0 4px}
#panel input[type="range"]{width:100%;margin:4px 0 8px}
#panel .range-row{display:flex;align-items:center;gap:12px}
#panel .range-row span{font-size:14px;color:#666;min-width:36px;text-align:right}
.panel-btn{width:100%;padding:10px;border:none;border-radius:10px;font-size:15px;cursor:pointer;margin-top:8px;background:#f0f0f0;color:#333}
.panel-btn:active{background:#e0e0e0}
.panel-btn.primary{background:#333;color:white}
.panel-btn.primary:active{background:#555}
.panel-close{margin-top:12px;background:none;border:none;color:#999;font-size:14px;width:100%;text-align:center;padding:8px;cursor:pointer}
.book-item{padding:10px 12px;border-radius:8px;margin-bottom:4px;cursor:pointer;font-size:14px;color:#444}
.book-item:active{background:#f0f0f0}
.book-item.selected{background:#e8e8e8;font-weight:500}
#file-input-label{display:block;padding:10px 12px;border-radius:8px;border:1px dashed #ccc;text-align:center;color:#888;font-size:14px;cursor:pointer;margin-top:8px}
#file-input{display:none}
@media(orientation:landscape){#canvas-wrap{max-height:90vh}}
</style>
</head>
<body>

<div id="app">
  <!-- 顶栏 -->
  <div id="top-bar">
    <span id="mode-label">📝 随机字</span>
    <div><button class="top-btn" id="btn-settings" title="设置">⚙️</button></div>
  </div>

  <!-- 中间：左按钮 + 田字格 + 右按钮 -->
  <div id="mid-row">
    <button class="side-btn" id="btn-prev">
      <span class="arrow">◀</span>
      <span>上一个</span>
    </button>
    <div id="canvas-wrap"><canvas id="grid-canvas"></canvas></div>
    <button class="side-btn" id="btn-next">
      <span class="arrow">▶</span>
      <span>下一个</span>
    </button>
  </div>

  <!-- 底部 -->
  <div id="bottom-area">
    <div id="current-char"></div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="bottom-ctrl">
      <button class="bot-btn" id="btn-clear">✕ 清除</button>
    </div>
  </div>
</div>

<!-- 面板 -->
<div id="panel-overlay">
  <div id="panel">
    <h2 id="panel-title">设置</h2>
    <div id="panel-content"></div>
    <button class="panel-close" id="panel-close">关闭</button>
  </div>
</div>

<script>
// =============================================================
// 1. 字库 & 字帖
// =============================================================
const COMMON='的一是在不了有和人这中大为上个国我以要他时来用们生到作地于出就分对成会可主发年动同工也能下过子说产种面而方后多定行学法所民得经十三之进着等部度家电力里如水化高自二理起小物现实加量都两体制机当使点从业本去把性好应开它合还因由其些然前外天政四日那社义事平形相全表间样与关各重新线内数正心反你明看原又么利比或但质气第向道命此变条只没结解问意建月公无系军很情者最立代想已通并提直题党程展五果料象员革位入常文总次品式活设及管特件长求老头基资边流路级少图山统接知较将组见计别她手角期根论运农指几九区强放决西被干做必战先回则任取据处队南给色光门即保治北造百规热领七海口东导器压志世金增争济阶油思术极交受联什认六共权收证改清己美再采转更单风切打白教速花带安场身车例真务具万每目至达走积示议声报斗完类八离华名确才科张信马节话米整空元况今集温传土许步群广石记需段研界拉林律叫且究观越织装影算低持音众书布复容儿须际商非验连断深难近矿千周委素技备半办青省列习响约支般史感劳便团往酸历市克何除消构府称太准精值号率族维划选标写存候毛亲快效斯院查江型眼王按格养易置派层片始却专状育厂京识适属圆包火住调满县局照参红细引听该铁价严龙飞';
const CHARS=COMMON.split('');
const BOOKS=[
{title:'三字经（节选）',text:'人之初性本善性相近习相远苟不教性乃迁教之道贵以专昔孟母择邻处子不学断机杼窦燕山有义方教五子名俱扬养不教父之过教不严师之惰子不学非所宜幼不学老何为玉不琢不成器人不学不知义为人子方少时亲师友习礼仪香九龄能温席孝于亲所当执融四岁能让梨弟于长宜先知首孝悌次见闻知某数识某文一而十十而百百而千千而万'},
{title:'百家姓（节选）',text:'赵钱孙李周吴郑王冯陈褚卫蒋沈韩杨朱秦尤许何吕施张孔曹严华金魏陶姜戚谢邹喻柏水窦章云苏潘葛奚范彭郎鲁韦昌马苗凤花方俞任袁柳丰鲍史唐费廉岑薛雷贺倪汤滕殷罗毕郝邬安常乐于时傅皮卞齐康伍余元卜顾孟平黄和穆萧尹姚邵湛汪祁毛禹狄米贝明臧计伏成戴谈宋茅庞熊纪舒屈项祝董梁杜阮蓝闵席季麻强贾路娄危江童颜郭梅盛林刁钟徐邱骆高夏蔡田樊胡凌霍'},
{title:'静夜思（李白）',text:'床前明月光疑是地上霜举头望明月低头思故乡'},
{title:'春晓（孟浩然）',text:'春眠不觉晓处处闻啼鸟夜来风雨声花落知多少'},
{title:'登鹳雀楼（王之涣）',text:'白日依山尽黄河入海流欲穷千里目更上一层楼'},
{title:'咏柳（贺知章）',text:'碧玉妆成一树高万条垂下绿丝绦不知细叶谁裁出二月春风似剪刀'},
];

// =============================================================
// 2. 状态
// =============================================================
const S={
  mode:'random',chars:CHARS,currentChar:'',bookName:'',
  isDrawing:false,strokes:[],currentStroke:[],
  autoTimer:null,autoDelay:600,  // ★ 默认600ms，提笔后等这么久没动静就跳
  historyIndex:0,currentIndex:0,
  guideOpacity:0.12,
};

// =============================================================
// 3. 画布
// =============================================================
const cv=document.getElementById('grid-canvas'),cx=cv.getContext('2d'),wp=document.getElementById('canvas-wrap');
const chEl=document.getElementById('current-char'),pgW=document.getElementById('progress-wrap'),pgB=document.getElementById('progress-bar');
let dpr=1,gs=300;

function resize(){
  dpr=window.devicePixelRatio||1;
  const vw=window.innerWidth,vh=window.innerHeight;
  // 留出上下空间：顶栏44 + 底部区域 ~80
  const availH=vh-44-80,availW=vw-44-44-12; // 44*2=侧按钮, 12=间距
  gs=Math.max(200,Math.min(availW-10,availH-10,480));
  wp.style.width=gs+'px';wp.style.height=gs+'px';
  cv.width=gs*dpr;cv.height=gs*dpr;
  cv.style.width=gs+'px';cv.style.height=gs+'px';
  cx.setTransform(1,0,0,1,0,0);cx.scale(dpr,dpr);
  render();
}
function render(){
  const sz=gs,pd=10,gx=pd,gy=pd,gw=sz-pd*2,hf=gw/2;
  cx.clearRect(0,0,sz,sz);
  cx.strokeStyle='rgba(0,0,0,0.15)';cx.lineWidth=1;
  cx.strokeRect(gx,gy,gw,gw);
  cx.beginPath();cx.moveTo(gx+hf,gy);cx.lineTo(gx+hf,gy+gw);
  cx.moveTo(gx,gy+hf);cx.lineTo(gx+gw,gy+hf);cx.stroke();
  if(S.currentChar){
    cx.font='bold '+(gw*0.65)+'px "KaiTi","STKaiti","Noto Serif SC","SimSun",serif';
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillStyle='rgba(100,100,120,'+S.guideOpacity+')';
    cx.fillText(S.currentChar,sz/2,sz/2+2);
  }
  cx.strokeStyle='#3b82f6';cx.lineCap='round';cx.lineJoin='round';cx.lineWidth=4;
  for(let i=0;i<S.strokes.length;i++)drawStroke(S.strokes[i]);
  if(S.currentStroke.length>1){cx.globalAlpha=0.9;drawStroke(S.currentStroke);cx.globalAlpha=1;}
}
function drawStroke(pts){
  if(pts.length<2)return;
  cx.beginPath();cx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length-1;i++){
    const mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2;
    cx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
  }
  cx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);cx.stroke();
}
function updateUI(){
  chEl.textContent=S.currentChar||'';
  if(S.mode==='copybook'){
    pgW.classList.add('show');
    pgB.style.width=Math.min(S.chars.length>0?S.historyIndex/S.chars.length*100:0,100)+'%';
  }else{pgW.classList.remove('show')}
}

// =============================================================
// 4. ★ 核心逻辑：提笔 → 等600ms → 没动静 → 自动跳
//    再次下笔 → 取消计时（说明还在写）
//    ★ 双击画布：快速点两下 → 立即跳
// =============================================================
let lastUp=0; // 上次提笔时间（双击检测用）

function clearAT(){if(S.autoTimer){clearTimeout(S.autoTimer);S.autoTimer=null}}
function startAT(){clearAT();S.autoTimer=setTimeout(()=>{S.autoTimer=null;nextChar()},S.autoDelay)}

function getPos(e){const r=cv.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top,p:e.pressure||0.5}}

function onDown(e){
  e.preventDefault();
  const now=Date.now();

  // ★ 双击检测：点下去就抬起，两次间隔<350ms → 跳转（不像画画的快速点两下）
  if(now-lastUp<350 && S.strokes.length===0 && S.currentStroke.length===0){
    lastUp=0;nextChar();return;
  }

  clearAT(); // 下笔了 → 取消自动跳转计时（用户还在写）
  const p=getPos(e);
  S.isDrawing=true;
  S.currentStroke=[{x:p.x,y:p.y}];
  cv.setPointerCapture(e.pointerId);
}
function onMove(e){
  e.preventDefault();if(!S.isDrawing)return;
  const p=getPos(e);S.currentStroke.push({x:p.x,y:p.y});
  cx.lineWidth=3+(p.p||0.5)*4;render();
}
function onUp(e){
  e.preventDefault();if(!S.isDrawing)return;
  S.isDrawing=false;
  if(S.currentStroke.length>1)S.strokes.push([...S.currentStroke]);
  S.currentStroke=[];render();
  lastUp=Date.now();
  // ★ 提笔了 → 启动自动跳转计时器
  startAT();
}
cv.addEventListener('pointerdown',onDown);
cv.addEventListener('pointermove',onMove);
cv.addEventListener('pointerup',onUp);
cv.addEventListener('pointercancel',onUp);

// =============================================================
// 5. 跳转控制
// =============================================================
function nextChar(){
  clearAT();
  if(S.mode==='random'){
    S.currentChar=S.chars[Math.floor(Math.random()*S.chars.length)];S.historyIndex++;
  }else{
    S.historyIndex=Math.min(S.historyIndex+1,S.chars.length-1);
    S.currentChar=S.chars[S.historyIndex];
    if(S.historyIndex>=S.chars.length-1)S.historyIndex=-1;
  }
  S.strokes=[];S.currentStroke=[];render();updateUI();
}
function prevChar(){
  clearAT();S.strokes=[];S.currentStroke=[];
  if(S.mode==='random'){
    S.currentChar=S.chars[Math.floor(Math.random()*S.chars.length)];
  }else{
    S.currentIndex=Math.max(0,(S.currentIndex||0)-1);
    S.currentChar=S.chars[S.currentIndex];S.historyIndex=S.currentIndex;
  }
  render();updateUI();
}
function clearStrokes(){S.strokes=[];S.currentStroke=[];clearAT();render();updateUI()}

function switchMode(mode){
  S.mode=mode;S.strokes=[];S.currentStroke=[];S.historyIndex=0;S.currentIndex=0;
  document.getElementById('mode-label').textContent=mode==='random'?'📝 随机字':'📖 抄书';
  if(mode==='random'){S.chars=CHARS}else{loadBook(0);return}
  nextChar();
}
function loadBook(idx){
  const b=BOOKS[idx];if(!b)return;
  S.bookName=b.title;S.chars=b.text.split('');S.currentIndex=0;S.historyIndex=0;
  S.strokes=[];S.currentStroke=[];S.currentChar=S.chars[0]||'';S.mode='copybook';
  document.getElementById('mode-label').textContent='📖 '+b.title;render();updateUI();
}
function loadUserText(t){
  const c=t.replace(/[^\u4e00-\u9fff]/g,'');
  if(!c.length){alert('没找到汉字');return}
  S.bookName='用户导入';S.chars=c.split('');S.currentIndex=0;S.historyIndex=0;
  S.strokes=[];S.currentStroke=[];S.currentChar=S.chars[0]||'';S.mode='copybook';
  document.getElementById('mode-label').textContent='📖 用户导入';render();updateUI();
}

// =============================================================
// 6. 面板
// =============================================================
function openSettings(){
  document.getElementById('panel-title').textContent='设置';
  document.getElementById('panel-content').innerHTML=
    '<label>提笔后等多久自动跳转</label><div class="range-row">'+
    '<input type="range" id="s-del" min="200" max="2500" step="50" value="'+S.autoDelay+'">'+
    '<span id="s-del-val">'+(S.autoDelay/1000).toFixed(1)+'秒</span></div>'+
    '<label>引导字透明度</label><div class="range-row">'+
    '<input type="range" id="s-op" min="3" max="30" step="1" value="'+Math.round(S.guideOpacity*100)+'">'+
    '<span id="s-op-val">'+Math.round(S.guideOpacity*100)+'%</span></div>'+
    '<button class="panel-btn primary" id="s-sw">'+(S.mode==='random'?'切换到：抄书模式':'切换到：随机模式')+'</button>'+
    (S.mode==='copybook'?'<button class="panel-btn" id="s-bk">选书</button>':'')+
    '<button class="panel-btn" id="s-im">📂 导入 TXT 文件</button>'+
    '<input type="file" id="file-input" accept=".txt" style="display:none">';
  document.getElementById('s-del').oninput=function(){S.autoDelay=+this.value;document.getElementById('s-del-val').textContent=(S.autoDelay/1000).toFixed(1)+'秒'};
  document.getElementById('s-op').oninput=function(){S.guideOpacity=+this.value/100;document.getElementById('s-op-val').textContent=this.value+'%';render()};
  document.getElementById('s-sw').onclick=function(){document.getElementById('panel-overlay').classList.remove('show');switchMode(S.mode==='random'?'copybook':'random')};
  const sb=document.getElementById('s-bk');if(sb)sb.onclick=openBookList;
  document.getElementById('s-im').onclick=function(){document.getElementById('file-input').click()};
  document.getElementById('file-input').onchange=function(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=function(ev){loadUserText(ev.target.result);document.getElementById('panel-overlay').classList.remove('show')};
    r.readAsText(f,'UTF-8')};
  document.getElementById('panel-overlay').classList.add('show');
}
function openBookList(){
  document.getElementById('panel-title').textContent='选择字帖';
  let h='';for(let i=0;i<BOOKS.length;i++)h+='<div class="book-item" data-idx="'+i+'">'+BOOKS[i].title+'（'+BOOKS[i].text.length+'字）</div>';
  h+='<label id="file-input-label" for="file-input">📂 从本地导入 TXT 文件...</label><input type="file" id="file-input" accept=".txt" style="display:none">';
  document.getElementById('panel-content').innerHTML=h;
  document.querySelectorAll('.book-item').forEach(el=>{el.onclick=function(){loadBook(+this.dataset.idx);document.getElementById('panel-overlay').classList.remove('show')}});
  document.getElementById('file-input').onchange=function(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=function(ev){loadUserText(ev.target.result);document.getElementById('panel-overlay').classList.remove('show')};
    r.readAsText(f,'UTF-8')};
  document.getElementById('panel-overlay').classList.add('show');
}

document.getElementById('btn-settings').onclick=openSettings;
document.getElementById('mode-label').onclick=function(){switchMode(S.mode==='random'?'copybook':'random')};
document.getElementById('btn-next').onclick=nextChar;
document.getElementById('btn-prev').onclick=prevChar;
document.getElementById('btn-clear').onclick=clearStrokes;
document.getElementById('panel-close').onclick=function(){document.getElementById('panel-overlay').classList.remove('show')};
document.getElementById('panel-overlay').onclick=function(e){if(e.target===document.getElementById('panel-overlay'))document.getElementById('panel-overlay').classList.remove('show')};
window.addEventListener('resize',resize);

function init(){resize();S.mode='random';S.chars=CHARS;S.currentChar=S.chars[Math.floor(Math.random()*S.chars.length)];S.historyIndex=0;render();updateUI()}
init();
</script>
</body>
</html>
